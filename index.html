<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>тЬи цпПцЧеф╗╗хКбцЭ┐ Daily Tasks</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&family=Baloo+2:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --c1: #FF6B9D; --c2: #FF9F43; --c3: #FECA57; --c4: #48DBFB;
    --c5: #FF6B6B; --c6: #A29BFE; --c7: #55EFC4; --c8: #FD79A8;
    --bg: #1a1a2e; --bg2: #16213e; --bg3: #0f3460;
    --text: #f8f9fa; --text2: #adb5bd;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(162,155,254,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(255,107,157,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 60% 80%, rgba(72,219,251,0.12) 0%, transparent 60%);
    animation: bgShift 8s ease-in-out infinite alternate; pointer-events: none;
  }
  @keyframes bgShift { 0%{opacity:0.6} 100%{opacity:1;transform:scale(1.05)} }

  .container { position:relative;z-index:1;max-width:860px;margin:0 auto;padding:24px 16px; }

  /* SYNC STATUS */
  .sync-bar {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; font-size: 0.8rem; color: var(--text2);
    margin-bottom: 16px; font-weight: 700;
  }
  .sync-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text2); transition: background 0.3s;
  }
  .sync-dot.ok { background: var(--c7); box-shadow: 0 0 8px var(--c7); }
  .sync-dot.loading { background: var(--c3); animation: pulse 1s infinite; }
  .sync-dot.err { background: var(--c5); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* HEADER */
  .header { text-align:center; margin-bottom:32px; }
  .header h1 {
    font-family:'Fredoka One',cursive; font-size:clamp(2rem,6vw,3.2rem);
    background:linear-gradient(135deg,var(--c1),var(--c3),var(--c4));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    animation:titlePop 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes titlePop { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }
  .header .subtitle { font-size:1rem;color:var(--text2);margin-top:6px;font-weight:600; }

  /* TOP BAR */
  .top-bar {
    display:flex; align-items:center; justify-content:space-between;
    background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
    border-radius:20px; padding:14px 24px; margin-bottom:28px;
    backdrop-filter:blur(10px); gap:16px; flex-wrap:wrap;
  }
  .date-display { font-size:1rem;font-weight:700;color:var(--c3); }
  .streak-section { display:flex;align-items:center;gap:10px; }
  .streak-flame { font-size:1.6rem;animation:flamePulse 1.5s ease-in-out infinite; }
  @keyframes flamePulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2) rotate(-5deg)} }
  .streak-count {
    font-family:'Fredoka One',cursive; font-size:1.8rem;
    background:linear-gradient(135deg,var(--c2),var(--c3));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .streak-label { font-size:0.85rem;color:var(--text2);font-weight:700; }
  .checkin-btn {
    font-family:'Nunito',sans-serif; font-weight:800; font-size:0.9rem;
    padding:10px 20px; border:none; border-radius:50px; cursor:pointer;
    background:linear-gradient(135deg,var(--c1),var(--c6)); color:white;
    box-shadow:0 4px 20px rgba(255,107,157,0.4); transition:all 0.2s; white-space:nowrap;
  }
  .checkin-btn:hover { transform:translateY(-2px); }
  .checkin-btn.done { background:linear-gradient(135deg,var(--c7),#00b894); pointer-events:none; }

  /* PROGRESS */
  .progress-wrap { margin-bottom:28px; }
  .progress-meta { display:flex;justify-content:space-between;font-size:0.88rem;font-weight:700;color:var(--text2);margin-bottom:8px; }
  .progress-meta span:last-child { color:var(--c3); }
  .progress-track { height:14px;border-radius:99px;background:rgba(255,255,255,0.08);overflow:hidden; }
  .progress-fill {
    height:100%; border-radius:99px;
    background:linear-gradient(90deg,var(--c1),var(--c3),var(--c4));
    transition:width 0.5s cubic-bezier(0.34,1.56,0.64,1); position:relative;
  }
  .progress-fill::after {
    content:''; position:absolute;right:0;top:0;bottom:0;width:30px;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4));
    animation:shimmer 1.5s infinite;
  }
  @keyframes shimmer { 0%,100%{opacity:0.5} 50%{opacity:1} }

  /* ADD TASK */
  .add-section { display:flex;gap:10px;margin-bottom:30px; }
  .task-input {
    flex:1; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:600;
    background:rgba(255,255,255,0.07); border:2px solid rgba(255,255,255,0.12);
    border-radius:14px; padding:12px 18px; color:var(--text); outline:none;
    transition:border-color 0.2s,box-shadow 0.2s;
  }
  .task-input::placeholder { color:var(--text2); }
  .task-input:focus { border-color:var(--c6);box-shadow:0 0 0 4px rgba(162,155,254,0.2); }
  .add-btn {
    font-family:'Fredoka One',cursive; font-size:1.1rem;
    padding:12px 22px; border:none; border-radius:14px; cursor:pointer;
    background:linear-gradient(135deg,var(--c6),var(--c4)); color:white;
    box-shadow:0 4px 20px rgba(162,155,254,0.35); transition:all 0.2s; white-space:nowrap;
  }
  .add-btn:hover { transform:translateY(-2px) scale(1.03); }

  /* TASK GRID */
  .tasks-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px; }
  .task-card {
    border-radius:20px; padding:20px 16px; cursor:pointer; position:relative; overflow:hidden;
    border:2px solid transparent; background:rgba(255,255,255,0.06); backdrop-filter:blur(8px);
    transition:transform 0.2s,box-shadow 0.2s; animation:cardIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    min-height:130px; display:flex; flex-direction:column; justify-content:space-between;
  }
  @keyframes cardIn { from{opacity:0;transform:scale(0.7) rotate(-3deg)} to{opacity:1;transform:scale(1) rotate(0)} }
  .task-card:hover { transform:translateY(-4px) scale(1.02); }
  .task-card.color-0 { border-color:rgba(255,107,157,0.4); --card-accent:var(--c1); }
  .task-card.color-1 { border-color:rgba(255,159,67,0.4); --card-accent:var(--c2); }
  .task-card.color-2 { border-color:rgba(254,202,87,0.4); --card-accent:var(--c3); }
  .task-card.color-3 { border-color:rgba(72,219,251,0.4); --card-accent:var(--c4); }
  .task-card.color-4 { border-color:rgba(255,107,107,0.4); --card-accent:var(--c5); }
  .task-card.color-5 { border-color:rgba(162,155,254,0.4); --card-accent:var(--c6); }
  .task-card.color-6 { border-color:rgba(85,239,196,0.4); --card-accent:var(--c7); }
  .task-card.color-7 { border-color:rgba(253,121,168,0.4); --card-accent:var(--c8); }
  .task-card::before {
    content:''; position:absolute; inset:0; opacity:0;
    background:radial-gradient(circle at 30% 30%, var(--card-accent,var(--c1)), transparent 70%);
    transition:opacity 0.3s;
  }
  .task-card.done::before { opacity:0.2; }
  .task-card.color-0.done { border-color:var(--c1);background:rgba(255,107,157,0.15); }
  .task-card.color-1.done { border-color:var(--c2);background:rgba(255,159,67,0.15); }
  .task-card.color-2.done { border-color:var(--c3);background:rgba(254,202,87,0.15); }
  .task-card.color-3.done { border-color:var(--c4);background:rgba(72,219,251,0.15); }
  .task-card.color-4.done { border-color:var(--c5);background:rgba(255,107,107,0.15); }
  .task-card.color-5.done { border-color:var(--c6);background:rgba(162,155,254,0.15); }
  .task-card.color-6.done { border-color:var(--c7);background:rgba(85,239,196,0.15); }
  .task-card.color-7.done { border-color:var(--c8);background:rgba(253,121,168,0.15); }
  .card-emoji { font-size:1.8rem;margin-bottom:8px; }
  .card-text { font-family:'Baloo 2',cursive;font-size:1rem;font-weight:600;line-height:1.3;flex:1;word-break:break-word; }
  .task-card.done .card-text { text-decoration:line-through;opacity:0.6; }
  .card-check { font-size:1.4rem;margin-top:10px;display:flex;justify-content:flex-end; }
  .delete-btn {
    position:absolute;top:8px;right:8px; background:rgba(255,255,255,0.1);border:none;
    border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:0.7rem;
    color:var(--text2);display:flex;align-items:center;justify-content:center;
    opacity:0;transition:opacity 0.2s;
  }
  .task-card:hover .delete-btn { opacity:1; }
  .delete-btn:hover { background:rgba(255,107,107,0.4);color:white; }

  .burst { position:fixed;pointer-events:none;z-index:999;font-size:1.5rem;animation:burstAnim 0.8s ease-out forwards; }
  @keyframes burstAnim { 0%{opacity:1;transform:scale(0.5) translateY(0)} 100%{opacity:0;transform:scale(1.5) translateY(-60px)} }

  .empty-state { text-align:center;padding:60px 20px;grid-column:1/-1; }
  .empty-state .icon { font-size:4rem;margin-bottom:16px; }
  .empty-state p { color:var(--text2);font-size:1.1rem;font-weight:600; }

  /* CALENDAR */
  .calendar-section {
    margin-top:36px; background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08); border-radius:24px; padding:24px;
  }
  .section-title {
    font-family:'Fredoka One',cursive; font-size:1.3rem; margin-bottom:16px;
    background:linear-gradient(135deg,var(--c3),var(--c2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .cal-grid { display:flex;gap:6px;flex-wrap:wrap; }
  .cal-day {
    width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    font-size:0.72rem;font-weight:800;background:rgba(255,255,255,0.06);color:var(--text2);
  }
  .cal-day.checked { background:linear-gradient(135deg,var(--c2),var(--c1));color:white;box-shadow:0 2px 10px rgba(255,107,157,0.4); }
  .cal-day.today { border:2px solid var(--c4);color:var(--c4); }
  .cal-day.checked.today { border:2px solid var(--c3); }

  /* NOTIFICATION */
  .notif {
    position:fixed;bottom:24px;right:24px;left:24px;max-width:400px;margin-left:auto;
    background:linear-gradient(135deg,var(--bg3),var(--bg2));border:2px solid var(--c1);
    border-radius:20px;padding:16px 20px;z-index:100;
    animation:slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow:0 8px 32px rgba(255,107,157,0.3);display:flex;align-items:center;gap:12px;
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(60px)} to{opacity:1;transform:translateY(0)} }
  .notif-icon { font-size:2rem; }
  .notif-text strong { display:block;font-size:1rem;color:var(--c1);margin-bottom:2px; }
  .notif-text span { font-size:0.85rem;color:var(--text2); }
  .notif-close { margin-left:auto;background:none;border:none;cursor:pointer;font-size:1.2rem;color:var(--text2); }

  .all-done {
    text-align:center;padding:20px;
    background:linear-gradient(135deg,rgba(85,239,196,0.1),rgba(72,219,251,0.1));
    border:2px solid var(--c7);border-radius:20px;margin-top:24px;
    font-family:'Fredoka One',cursive;font-size:1.4rem;
    animation:bounceIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes bounceIn { from{transform:scale(0.8);opacity:0} to{transform:scale(1);opacity:1} }

  .emoji-picker { display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap; }
  .emoji-opt {
    font-size:1.4rem;cursor:pointer;padding:4px;border-radius:8px;
    transition:transform 0.2s,background 0.2s;background:transparent;border:2px solid transparent;
  }
  .emoji-opt:hover { transform:scale(1.3); }
  .emoji-opt.selected { background:rgba(255,255,255,0.12);border-color:var(--c6); }

  @media(max-width:480px) {
    .tasks-grid { grid-template-columns:repeat(2,1fr); }
    .add-section { flex-direction:column; }
  }
</style>
</head>
<body>

<script>
// ===== SUPABASE CONFIG =====
const SUPABASE_URL = 'https://xujqcgwiqitpxtzrsfgi.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1anFjZ3dpcWl0cHh0enJzZmdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4OTAzNTQsImV4cCI6MjA4ODQ2NjM1NH0.HzEC7yG2FYXdtNM8wYd4GfbyNT5M-F4zvkmCfw0H9Nw';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ===== STATE =====
const EMOJIS = ['тнР','ЁЯУЪ','ЁЯПГ','ЁЯНО','ЁЯТК','ЁЯОо','ЁЯОи','ЁЯз╣','ЁЯТк','ЁЯМ┐','ЁЯУЭ','ЁЯЫБ','ЁЯОп','ЁЯО╡','ЁЯзШ','ЁЯМЩ'];
let selectedEmoji = 'тнР';
let tasks = [];
let checkinDates = new Set();
let streak = 0;
let colorIndex = 0;

// ===== SYNC UI =====
function setSyncStatus(state) {
  const dot = document.getElementById('syncDot');
  const label = document.getElementById('syncLabel');
  dot.className = 'sync-dot ' + state;
  if (state === 'ok') label.textContent = 'тШБя╕П х╖▓хРМцне';
  else if (state === 'loading') label.textContent = 'ш┐ЮцОеф╕нтАж';
  else label.textContent = 'тЪая╕П чж╗ч║┐цибх╝П';
}

// ===== INIT =====
async function init() {
  renderEmojiPicker();
  renderDate();
  await loadAll();
  scheduleReminder();
}

async function loadAll() {
  setSyncStatus('loading');
  try {
    const today = getToday();

    // Load checkins
    const { data: ci, error: e1 } = await sb.from('checkins').select('date');
    if (e1) throw e1;
    checkinDates = new Set((ci || []).map(r => r.date));
    streak = calcStreak();
    document.getElementById('streakCount').textContent = streak;
    updateCheckinBtn();
    renderCalendar();

    // Load tasks
    const { data: ts, error: e2 } = await sb.from('tasks').select('*').order('created_at');
    if (e2) throw e2;

    if (!ts || ts.length === 0) {
      // First time: insert default tasks
      const defaults = [
        { id: 'default-1', text: 'хЦЭц░┤ Drink Water', emoji: 'ЁЯТз', color_idx: 0, done: false },
        { id: 'default-2', text: 'хРГцЧйщен Breakfast', emoji: 'ЁЯНО', color_idx: 1, done: false },
        { id: 'default-3', text: 'ш┐РхКи Exercise', emoji: 'ЁЯПГ', color_idx: 2, done: false },
        { id: 'default-4', text: 'хнжф╣а Study', emoji: 'ЁЯУЪ', color_idx: 3, done: false },
      ];
      await sb.from('tasks').insert(defaults);
      tasks = defaults.map(d => ({ id: d.id, text: d.text, emoji: d.emoji, color: d.color_idx, done: false }));
    } else {
      // Reset done status if it's a new day
      const lastDate = localStorage.getItem('adhd_last_date');
      if (lastDate !== today) {
        await sb.from('tasks').update({ done: false }).neq('id', 'none');
        localStorage.setItem('adhd_last_date', today);
        tasks = ts.map(t => ({ id: t.id, text: t.text, emoji: t.emoji, color: t.color_idx, done: false }));
      } else {
        tasks = ts.map(t => ({ id: t.id, text: t.text, emoji: t.emoji, color: t.color_idx, done: t.done }));
      }
    }

    colorIndex = tasks.length;
    renderTasks();
    updateProgress();
    setSyncStatus('ok');
  } catch(err) {
    console.error(err);
    setSyncStatus('err');
    // Fallback to localStorage
    const saved = localStorage.getItem('adhd_tasks_v2');
    tasks = saved ? JSON.parse(saved) : [];
    renderTasks();
    updateProgress();
  }
}

// ===== DATE =====
function getToday() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function renderDate() {
  const d = new Date();
  const days = ['цЧе','ф╕А','ф║М','ф╕Й','хЫЫ','ф║Ф','хЕн'];
  const months = ['ф╕А','ф║М','ф╕Й','хЫЫ','ф║Ф','хЕн','ф╕Г','хЕл','ф╣Э','хНБ','хНБф╕А','хНБф║М'];
  document.getElementById('dateDisplay').innerHTML =
    `${d.getFullYear()}х╣┤${months[d.getMonth()]}цЬИ${d.getDate()}цЧе &nbsp;|&nbsp; хСи${days[d.getDay()]}`;
}

// ===== STREAK =====
function calcStreak() {
  let s = 0;
  const d = new Date();
  while(true) {
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (checkinDates.has(key)) { s++; d.setDate(d.getDate()-1); }
    else break;
  }
  return s;
}

// ===== CHECK-IN =====
async function doCheckin() {
  const today = getToday();
  if (checkinDates.has(today)) return;
  setSyncStatus('loading');
  try {
    const { error } = await sb.from('checkins').insert({ date: today });
    if (error) throw error;
    checkinDates.add(today);
    streak = calcStreak();
    document.getElementById('streakCount').textContent = streak;
    updateCheckinBtn();
    renderCalendar();
    setSyncStatus('ok');
    showNotif('ЁЯОЙ цЙУхНбцИРхКЯя╝Б', `ш┐Юч╗н ${streak} хдйф║Жя╝БхдкцгТф║Жя╝Б`);
    spawnBursts(['ЁЯОК','тнР','ЁЯФе','тЬи']);
  } catch(e) {
    setSyncStatus('err');
    showNotif('тЪая╕П хРМцнехд▒ш┤е', 'шп╖цгАцЯеч╜Сч╗Ьш┐ЮцОе');
  }
}

function updateCheckinBtn() {
  const btn = document.getElementById('checkinBtn');
  if (checkinDates.has(getToday())) {
    btn.textContent = 'тЬЕ х╖▓цЙУхНб Done!';
    btn.classList.add('done');
  }
}

// ===== TASKS =====
function renderEmojiPicker() {
  const el = document.getElementById('emojiPicker');
  el.innerHTML = EMOJIS.map(e =>
    `<span class="emoji-opt${e===selectedEmoji?' selected':''}" onclick="selectEmoji('${e}')">${e}</span>`
  ).join('');
}

function selectEmoji(e) {
  selectedEmoji = e;
  renderEmojiPicker();
}

async function addTask() {
  const input = document.getElementById('taskInput');
  const text = input.value.trim();
  if (!text) { input.focus(); return; }
  const newTask = {
    id: 'task-' + Date.now(),
    text,
    emoji: selectedEmoji,
    color_idx: colorIndex % 8,
    done: false
  };
  input.value = '';
  // Optimistic update
  tasks.push({ id: newTask.id, text: newTask.text, emoji: newTask.emoji, color: newTask.color_idx, done: false });
  colorIndex++;
  renderTasks();
  updateProgress();
  try {
    await sb.from('tasks').insert(newTask);
    setSyncStatus('ok');
  } catch(e) {
    setSyncStatus('err');
  }
}

async function toggleTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  task.done = !task.done;
  renderTasks();
  updateProgress();
  if (task.done) {
    spawnBursts(['тЬи','тнР','ЁЯМЯ']);
    checkAllDone();
  }
  try {
    await sb.from('tasks').update({ done: task.done }).eq('id', id);
    setSyncStatus('ok');
  } catch(e) {
    setSyncStatus('err');
  }
}

async function deleteTask(id, e) {
  e.stopPropagation();
  tasks = tasks.filter(t => t.id !== id);
  renderTasks();
  updateProgress();
  try {
    await sb.from('tasks').delete().eq('id', id);
    setSyncStatus('ok');
  } catch(e) {
    setSyncStatus('err');
  }
}

function renderTasks() {
  const grid = document.getElementById('tasksGrid');
  if (!tasks.length) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">ЁЯМ╕</div><p>ш┐Шц▓бцЬЙф╗╗хКбя╝Мц╖╗хКаф╕Аф╕кхРзя╝Б<br>No tasks yet тАФ add one above!</p></div>`;
    return;
  }
  grid.innerHTML = tasks.map((t, i) => `
    <div class="task-card color-${t.color} ${t.done?'done':''}"
         onclick="toggleTask('${t.id}')"
         style="animation-delay:${i*0.05}s">
      <button class="delete-btn" onclick="deleteTask('${t.id}',event)" title="хИащЩд">тЬХ</button>
      <div class="card-emoji">${t.emoji}</div>
      <div class="card-text">${escHtml(t.text)}</div>
      <div class="card-check">${t.done ? 'тЬЕ' : 'тмЬ'}</div>
    </div>
  `).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateProgress() {
  const total = tasks.length;
  const done = tasks.filter(t => t.done).length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progressText').textContent = `${done} / ${total}`;
  document.getElementById('progressFill').style.width = pct + '%';
}

function checkAllDone() {
  if (!tasks.length) return;
  if (tasks.every(t => t.done)) {
    document.getElementById('allDone').style.display = 'block';
    spawnBursts(['ЁЯОЙ','ЁЯПЖ','ЁЯМИ','тЬи','ЁЯОК']);
    setTimeout(() => showNotif('ЁЯПЖ хЕищГихоМцИРя╝Б', 'ф╗КхдйчЪДф╗╗хКбхЕищГицРЮхоЪф║Жя╝БхдкцгТф║Жя╝Б'), 800);
  } else {
    document.getElementById('allDone').style.display = 'none';
  }
}

// ===== CALENDAR =====
function renderCalendar() {
  const grid = document.getElementById('calGrid');
  const today = getToday();
  const d = new Date();
  d.setDate(d.getDate() - 27);
  let html = '';
  for (let i = 0; i < 28; i++) {
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const isToday = key === today;
    const isChecked = checkinDates.has(key);
    html += `<div class="cal-day${isChecked?' checked':''}${isToday?' today':''}" title="${key}">${d.getDate()}</div>`;
    d.setDate(d.getDate()+1);
  }
  grid.innerHTML = html;
}

// ===== NOTIFICATIONS =====
function showNotif(title, msg) {
  document.getElementById('notifTitle').textContent = title;
  document.getElementById('notifMsg').textContent = msg;
  const n = document.getElementById('notif');
  n.style.display = 'flex';
  clearTimeout(window._notifTimer);
  window._notifTimer = setTimeout(closeNotif, 5000);
}
function closeNotif() { document.getElementById('notif').style.display = 'none'; }

function scheduleReminder() {
  setInterval(() => {
    const now = new Date();
    if (now.getHours() >= 20 && !checkinDates.has(getToday())) {
      showNotif('ЁЯжЙ цПРщЖТя╝Б', 'ф╗Кхдйш┐Шц▓бцЬЙцЙУхНбхУжя╝МхИлх┐Шф║Жя╝Б');
    }
  }, 60000);
  const now = new Date();
  if (now.getHours() >= 20 && !checkinDates.has(getToday())) {
    setTimeout(() => showNotif('ЁЯжЙ цПРщЖТя╝Б', 'ф╗Кхдйш┐Шц▓бцЬЙцЙУхНбхУжя╝МхИлх┐Шф║Жя╝Б'), 3000);
  }
}

// ===== CONFETTI =====
function spawnBursts(emojis) {
  for (let i = 0; i < 8; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'burst';
      el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      el.style.left = (Math.random()*window.innerWidth) + 'px';
      el.style.top = (Math.random()*window.innerHeight*0.6 + 100) + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 900);
    }, i * 80);
  }
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closeNotif(); });
init();
</script>
